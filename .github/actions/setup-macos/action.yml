name: Setup macOS build deps
description: Install + cache mise tools and ThirdParty build outputs (Ghostty, zmx)

inputs:
  disable-tools:
    description: Comma-separated mise tools to skip, so CI installs only what it needs.
    default: spm:swiftlang/swift-format,npm:create-dmg

runs:
  using: composite
  steps:
    # Job-wide so every later mise call (install, plus auto-install during the
    # build steps under MISE_YES) skips the unneeded tools, not just this step.
    - name: Limit mise to the tools CI needs
      shell: bash
      run: echo "MISE_DISABLE_TOOLS=${{ inputs.disable-tools }}" >> "$GITHUB_ENV"
    # The app and tests build with the runner's DEFAULT Xcode (26.5+ SDK) so CI
    # compiles with the same toolchain as dev machines — no global xcode-select.
    # Only the Zig builds (ghostty/zmx) need an older Xcode: zig 0.15.2 can't link
    # the macOS 26.4+ SDK (ziglang/zig#31658). build-ghostty.sh / build-zmx.sh pin
    # DEVELOPER_DIR themselves via the shared selector; here we only fail fast if
    # no Zig-linkable Xcode exists on the runner, and print both toolchains.
    - name: Verify toolchains (default Xcode for app, Zig-linkable Xcode for ghostty/zmx)
      shell: bash
      run: |
        set -euo pipefail
        echo "App/test Xcode (default):"
        xcodebuild -version
        zig_developer_dir="$(./scripts/select-developer-dir.sh)"
        echo "Zig-linkable Xcode (ghostty/zmx): $zig_developer_dir"
        DEVELOPER_DIR="$zig_developer_dir" xcodebuild -version
    - uses: jdx/mise-action@v4
      with:
        version: 2026.3.0
        cache: true
    # Non-fatal: `tuist auth login` authenticates via GitHub OIDC and needs THIS repo to be linked
    # to a Tuist Cloud project. This fork isn't (no project registered under the handle in
    # Tuist.swift yet), so it fails with "No projects linked to the repository." The Tuist Cloud
    # remote binary cache is only a build-speed optimization — `optionalAuthentication: true` in
    # Tuist.swift lets `tuist generate` proceed uncached — so we don't let its absence fail the job.
    # TODO(p-term): once a Tuist Cloud project is registered for this repo, drop the `|| ...` guard.
    - name: Authenticate with Tuist (optional remote cache)
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      shell: bash
      run: mise exec -- tuist auth login || echo "::warning::Tuist auth failed (no linked Cloud project); continuing without the remote binary cache."
    # Keyed on the ZIG Xcode (the one that actually builds ghostty/zmx), not the
    # default app Xcode, so app-Xcode image bumps don't evict working artifacts.
    - name: Xcode cache key
      shell: bash
      run: |
        XCODE_VERSION="$(DEVELOPER_DIR="$(./scripts/select-developer-dir.sh)" xcodebuild -version | tr '\n' '-' | sed 's/[^A-Za-z0-9._-]/_/g; s/-$//')"
        printf '%s\n' "XCODE_VERSION=$XCODE_VERSION" >> "$GITHUB_ENV"
    - name: ThirdParty cache keys
      shell: bash
      run: |
        set -euo pipefail
        printf '%s\n' "GHOSTTY_SHA=$(git -C ThirdParty/ghostty rev-parse HEAD)" >> "$GITHUB_ENV"
        printf '%s\n' "ZMX_SHA=$(git -C ThirdParty/zmx rev-parse HEAD)" >> "$GITHUB_ENV"
    # Key on only the inputs that change the built artifact (submodule SHA, build
    # script, zig version, patches) so unrelated action/project edits don't evict it.
    - name: Ghostty cache
      id: ghostty_cache
      uses: actions/cache@v5
      with:
        path: .build/ghostty
        key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-ghostty-v3-${{ env.GHOSTTY_SHA }}-${{ hashFiles('scripts/build-ghostty.sh', 'mise.toml', '.gitmodules', 'patches/*.patch') }}
    - name: Build ghostty
      if: steps.ghostty_cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -uo pipefail
        # ghostty's foreign build pulls SPM deps (e.g. Sparkle) over the network and has flaked on
        # transient download timeouts / corrupted caches on a cold cache. Retry before failing the
        # whole job so an intermittent network hiccup doesn't cost a full re-run.
        for attempt in 1 2 3; do
          if make build-ghostty-xcframework; then exit 0; fi
          echo "::warning::ghostty build attempt $attempt failed; wiping the zig cache and retrying…"
          rm -rf .build/ghostty/.zig-cache .build/ghostty/.zig-global-cache 2>/dev/null || true
          sleep 15
        done
        echo "::error::ghostty build failed after 3 attempts"
        exit 1
    - name: zmx cache
      id: zmx_cache
      uses: actions/cache@v5
      with:
        path: .build/zmx
        key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-zmx-v1-${{ env.ZMX_SHA }}-${{ hashFiles('scripts/build-zmx.sh', 'mise.toml', '.gitmodules') }}
    - name: Build zmx
      if: steps.zmx_cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        make build-zmx
