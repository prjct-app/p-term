name: ci

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: read
      id-token: write
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - parallel:
          - run: make lint
          - run: make inspect-dependencies
      - name: Build app
        env:
          XCODEBUILD_FLAGS: -showBuildTimingSummary
        run: |
          # TCA's Swift macro plugins (@Reducer/@ObservableState) have intermittently crashed on CI
          # with "Corrupted JSON: unexpected end of file" — the plugin pipe dying mid-expansion,
          # usually runner memory pressure, not a source error. Retry once so a flaky plugin crash
          # doesn't fail an otherwise-green build; a real compile error still fails both attempts.
          make build-app || { echo "::warning::build-app failed; retrying once (transient macro-plugin flake)…"; make build-app; }
      - run: make test
