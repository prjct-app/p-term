name: export-thirdparty

# Exports the CI-built ThirdParty outputs (GhosttyKit.xcframework + resources, zmx)
# as downloadable artifacts. A dev machine whose SDK Zig 0.15.2 cannot link
# (macOS 26.4+, ziglang/zig#31658) downloads these into .build/ instead of
# installing Xcode 26.3:
#
#   gh run download <run-id> -n ghostty -D .build/ghostty
#   gh run download <run-id> -n zmx     -D .build/zmx
#
# The build scripts short-circuit on .build/*/fingerprint, so with these in place
# `make build-app` never needs a Zig-linkable Xcode locally. The fingerprint hashes
# the submodule SHA, patches, build script, and mise.toml — download artifacts from
# a run on the same commit (or at least the same values of those inputs) or the
# scripts will try to rebuild.
#
# Runs on manual dispatch, and on PRs touching this file so the PR introducing it
# can produce artifacts before it lands on main.
on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - .github/workflows/export-thirdparty.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: macos-26
    permissions:
      contents: read
      id-token: write
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      # Restores the ghostty/zmx caches (or builds them on a miss) exactly like ci.yml.
      - uses: ./.github/actions/setup-macos
      # Upload only the consumable outputs, not the multi-GB .zig-cache dirs.
      - uses: actions/upload-artifact@v4
        with:
          name: ghostty
          if-no-files-found: error
          path: |
            .build/ghostty/GhosttyKit.xcframework
            .build/ghostty/share
            .build/ghostty/fingerprint
      - uses: actions/upload-artifact@v4
        with:
          name: zmx
          if-no-files-found: error
          path: |
            .build/zmx/bin
            .build/zmx/fingerprint
